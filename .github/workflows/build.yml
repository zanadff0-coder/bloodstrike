name: Build Android NDK Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android NDK r21e
      run: |
        wget https://google.com
        unzip -q android-ndk-r21e-linux-x86_64.zip
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r21e" >> $GITHUB_ENV

    - name: Unzip Source Code
      run: |
        unzip -q "bloodstrike src 013 (1).zip"
        JNI_DIR=$(find . -type d -name "jni" | head -n 1)
        if [ -z "$JNI_DIR" ]; then
          echo "Error: jni folder not found!"
          exit 1
        fi
        echo "PROJ_DIR=$(dirname "$JNI_DIR")" >> $GITHUB_ENV

    - name: Compile C++ Code with ndk-build
      run: |
        cd ${{ env.PROJ_DIR }}
        $ANDROID_NDK_HOME/ndk-build

    - name: Upload Output Compiled .so Files
      uses: actions/upload-artifact@v4
      with:
        name: BloodStrike-Bypass-SO
        path: |
          **/libs/arm64-v8a/*.so
          **/libs/armeabi-v7a/*.so
